# Manual edits applied to speech.md after generation from body.md.
# If body.md changes, speech.md is regenerated and these edits are lost —
# replay them in order to restore the audio-friendly version.

edits:
  - find: "OpenAI's 2022 RLHF-tuned successor to GPT-3"
    replace: "OpenAI's 2022 reinforcement-learning-from-human-feedback-tuned successor to GPT-3"

  - find: "as a messages array of {role, content} pairs"
    replace: "as a messages array of role/content pairs"

  - find: "Pi, an open-source coding harness, takes the navigable line: /tree exposes the session as a tree"
    replace: "Pi, an open-source coding harness, takes the navigable line: the slash tree command exposes the session as a tree"

  - find: "Claude Code's /rewind, Codex CLI's Esc+Esc"
    replace: "Claude Code's slash rewind command, Codex CLI's double escape key combination"

  - find: |-
      Set the vendor question aside, though, and the open-source story isn't the ceiling either. Pi's /tree is a starting point
    replace: |-
      <break time="0.5s" />

      Set the vendor question aside, though, and the open-source story isn't the ceiling either. Pie's slash tree command is a starting point

  - find: |
      xoxo,
      ESCESC.
    replace: |
      xoxo,
      escape escape.
